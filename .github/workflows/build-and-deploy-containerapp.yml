# Required GitHub Secrets :
#   AZURE_CONTAINER_REGISTRY        - ACR login server (e.g. myregistry.azurecr.io)
#   AZURE_CONTAINER_REGISTRY_USERNAME - ACR admin username
#   AZURE_CONTAINER_REGISTRY_PASSWORD - ACR admin password
#   AZURE_CREDENTIALS               - Azure service principal JSON (az ad sp create-for-rbac output)
#   AZURE_RESOURCE_GROUP            - Resource group containing the Container App env
#   AZURE_CONTAINER_APP_NAME        - Name of the Azure Container App
#   FOUNDRY_ENDPOINT                - Azure AI Foundry endpoint
#   gpt_endpoint                    - GPT model endpoint
#   embedding_endpoint              - Embedding model endpoint
#   phi_4_endpoint                  - Phi-4 model endpoint

name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: chat-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --file ./src/Dockerfile \
            --tag ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./src
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new container image with environment variables
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.gpt_endpoint }}" \
              embedding_endpoint="${{ secrets.embedding_endpoint }}" \
              phi_4_endpoint="${{ secrets.phi_4_endpoint }}"
